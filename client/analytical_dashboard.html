<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideSync | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:      #e8000d;
            --red-glow: rgba(232, 0, 13, 0.35);
            --orange:      #f97316;
            --orange-glow: rgba(249, 115, 22, 0.35);
            --green:      #22c55e;
            --green-glow: rgba(34, 197, 94, 0.35);
            --bg:       #0d0d0d;
            --card-bg:  #131313;
            --border:   rgba(255,255,255,0.07);
            --text:     #ffffff;
            --text-dim: #aaaaaa;
            --text-muted: #555555;
            --radius:   16px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            padding: 3rem 1.5rem 5rem;
        }

        /* noise overlay */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: .5;
        }

        .wrapper { max-width: 1080px; margin: 0 auto; }

        /* ── HERO ── */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fade-up .5s ease both;
        }

        /* pfp */
        .pfp-ring {
            display: inline-block;
            padding: 3px;
            border-radius: 50%;
            background: conic-gradient(var(--red), #ff6b6b, var(--red));
            box-shadow: 0 0 24px var(--red-glow);
            animation: spin-ring 6s linear infinite;
            margin-bottom: 1.2rem;
            transition: box-shadow .3s;
        }
        .pfp-ring:hover {
            box-shadow: 0 0 48px var(--red-glow), 0 0 80px rgba(232,0,13,0.2);
        }
        @keyframes spin-ring {
            from { filter: hue-rotate(0deg); }
            to   { filter: hue-rotate(360deg); }
        }

        .pfp-inner {
            width: 96px; height: 96px;
            border-radius: 50%;
            overflow: hidden;
            background: #1e1e1e;
            display: flex; align-items: center; justify-content: center;
        }
        .pfp-inner img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            letter-spacing: -.02em;
            line-height: 1.2;
        }
        .hero-title .username { color: var(--red); }

        .hero-sub {
            font-family: 'Oswald', sans-serif;
            font-size: .72rem; font-weight: 500;
            letter-spacing: .22em; text-transform: uppercase;
            color: var(--text-muted);
            margin-top: .5rem;
        }

        /* ── STAT CARDS ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
            animation: fade-up .5s ease .1s both;
        }

        @media (max-width: 680px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .stat-card {
            position: relative;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem 1.6rem;
            display: flex; align-items: center; gap: 1.1rem;
            cursor: default;
            transition: transform .28s ease, border-color .28s ease, box-shadow .28s ease;
            overflow: hidden;
        }

        /* shimmer line at top on hover */
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0); transform-origin: left;
            transition: transform .35s ease;
        }
        .stat-card:hover::before { transform: scaleX(1); }

        /* background glow blob */
        .stat-card::after {
            content: '';
            position: absolute; bottom: -30px; right: -20px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            filter: blur(40px);
            transition: opacity .35s ease;
            pointer-events: none;
        }
        .stat-card:hover::after { opacity: .18; }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 0 1px var(--accent-glow);
        }

        /* per-card accent colors */
        .stat-card.red    { --accent: var(--red);    --accent-glow: var(--red-glow); }
        .stat-card.orange { --accent: var(--orange);  --accent-glow: var(--orange-glow); }
        .stat-card.green  { --accent: var(--green);   --accent-glow: var(--green-glow); }

        .stat-icon {
            width: 48px; height: 48px; flex-shrink: 0;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
            background: var(--accent);
            transition: box-shadow .28s ease;
        }
        .stat-card:hover .stat-icon {
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stat-label {
            font-family: 'Oswald', sans-serif;
            font-size: .65rem; font-weight: 500;
            letter-spacing: .2em; text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: .3rem;
            transition: color .28s;
        }
        .stat-card:hover .stat-label { color: var(--accent); }

        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem; font-weight: 900;
            letter-spacing: -.02em;
            color: var(--text);
            line-height: 1;
            transition: color .28s;
        }
        .stat-card:hover .stat-value { color: var(--accent); }

        /* ── TABLE PANEL ── */
        .panel {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fade-up .5s ease .2s both;
        }

        .panel-header {
            padding: 1.2rem 1.6rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: .6rem;
        }
        .panel-header::before {
            content: '';
            width: 18px; height: 2px;
            background: var(--red);
            display: inline-block;
        }
        .panel-title {
            font-family: 'Montserrat', sans-serif;
            font-size: .78rem; font-weight: 800;
            letter-spacing: .2em; text-transform: uppercase;
            color: var(--red);
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr {
            background: rgba(255,255,255,.03);
        }
        thead th {
            font-family: 'Oswald', sans-serif;
            font-size: .65rem; font-weight: 500;
            letter-spacing: .18em; text-transform: uppercase;
            color: var(--text-muted);
            padding: .9rem 1.4rem;
            text-align: left;
        }
        thead th:nth-child(3) { text-align: center; }
        thead th:nth-child(4) { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .2s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(232,0,13,.04); }

        tbody td {
            padding: 1rem 1.4rem;
            font-family: 'Barlow', sans-serif;
            font-size: .9rem;
            color: var(--text-dim);
            vertical-align: middle;
        }

        .td-title {
            font-family: 'Montserrat', sans-serif;
            font-size: .88rem; font-weight: 700;
            color: var(--red);
        }

        .td-route-from {
            font-size: .88rem; color: var(--text);
            display: block;
        }
        .td-route-to {
            font-size: .75rem; color: var(--text-muted);
            display: block; margin-top: .15rem;
        }

        .seats-chip {
            display: inline-block;
            font-family: 'Oswald', sans-serif;
            font-size: .65rem; font-weight: 500;
            letter-spacing: .1em; text-transform: uppercase;
            background: rgba(255,255,255,.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: .25rem .65rem;
            border-radius: 4px;
        }

        .td-fee {
            text-align: right;
            font-family: 'Montserrat', sans-serif;
            font-size: .9rem; font-weight: 800;
            color: var(--green);
        }

        td:nth-child(3) { text-align: center; }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }
        .empty-icon {
            font-size: 2rem; opacity: .15;
            display: block; margin-bottom: .8rem;
        }
        .empty-text {
            font-family: 'Oswald', sans-serif;
            font-size: .75rem; letter-spacing: .2em;
            color: var(--text-muted); text-transform: uppercase;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- HERO -->
    <div class="hero">
        <div class="pfp-ring">
            <div class="pfp-inner">
                <img id="orgPfp" src="" alt="Profile"
                     onerror="this.style.display='none'">
            </div>
        </div>
        <h1 class="hero-title">
            See Your Dashboard Analysis, <span class="username" id="userName">Rider</span>
        </h1>
        <div class="hero-sub">Real-time performance &amp; ride insights</div>
    </div>

    <!-- STAT CARDS -->
    <div class="stats-grid">
        <div class="stat-card red">
            <div class="stat-icon">
                <i class="fas fa-motorcycle"></i>
            </div>
            <div>
                <div class="stat-label">Rides Created</div>
                <div class="stat-value" id="ridesCreated">--</div>
            </div>
        </div>

        <div class="stat-card orange">
            <div class="stat-icon">
                <i class="fas fa-ticket-alt"></i>
            </div>
            <div>
                <div class="stat-label">Total Bookings</div>
                <div class="stat-value" id="totalBookings">--</div>
            </div>
        </div>

        <div class="stat-card green">
            <div class="stat-icon">
                <i class="fas fa-indian-rupee-sign"></i>
            </div>
            <div>
                <div class="stat-label">Revenue Generated</div>
                <div class="stat-value" id="revenue">--</div>
            </div>
        </div>
    </div>

    <!-- TABLE PANEL -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Successful Rides History</span>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Ride Title</th>
                        <th>Route</th>
                        <th>Seats</th>
                        <th>Entry Fee</th>
                    </tr>
                </thead>
                <tbody id="ridesTableBody">
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <span class="empty-icon">◈</span>
                                <div class="empty-text">Loading rides...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // ── User from localStorage ──
    const pfp      = localStorage.getItem('pfp');
    console.log(pfp);
    const username = localStorage.getItem('username') || localStorage.getItem('userName') || 'Rider';

    if (pfp) document.getElementById('orgPfp').src = pfp;
    document.getElementById('userName').textContent = username;

    // ── Basic Analysis ──
    fetch('https://ride-sync-backend-v1.onrender.com/dashboard/get_basic_analysis', {
        method: 'GET',
        credentials: 'include'
    })
    .then(res => res.json())
    .then(res => {
        if (!res.success) return console.error('Analysis failed:', res);
        const stats = res.data;
        document.getElementById('ridesCreated').textContent  = stats.ridesCreated;
        document.getElementById('totalBookings').textContent = stats.totalBookingsDone;
        document.getElementById('revenue').textContent       = `₹${stats.revenueGenerated}`;
    })
    .catch(err => console.error('Error fetching analysis:', err));

    // ── Successful Rides ──
    fetch('https://ride-sync-backend-v1.onrender.com/dashboard/get_successful_rides', {
        method: 'GET',
        credentials: 'include'
    })
    .then(res => res.json())
    .then(res => {
        const tbody = document.getElementById('ridesTableBody');

        if (!res.success) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
                <span class="empty-icon">⚠</span>
                <div class="empty-text">Could not load rides</div>
            </div></td></tr>`;
            return;
        }

        const rides = res.data;

        if (!rides || rides.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
                <span class="empty-icon">◈</span>
                <div class="empty-text">No successful rides yet</div>
            </div></td></tr>`;
            return;
        }

        tbody.innerHTML = rides.map(ride => {
            const from = (ride.startAddress || '').split(',')[0];
            const to   = (ride.endAddress   || '').split(',')[0];
            return `
            <tr>
                <td><div class="td-title">${ride.title || '—'}</div></td>
                <td>
                    <span class="td-route-from">${from || '—'}</span>
                    <span class="td-route-to">to ${to || '—'}</span>
                </td>
                <td><span class="seats-chip">${ride.bookedSeats ?? '—'} Booked</span></td>
                <td class="td-fee">₹${ride.entryFee ?? '—'}</td>
            </tr>`;
        }).join('');
    })
    .catch(err => console.error('Error fetching rides:', err));

});
</script>

</body>
</html>
