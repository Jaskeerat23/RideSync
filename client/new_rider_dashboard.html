<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideSync — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,900&family=Oswald:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --red:        #e8000d;
  --red-dark:   #b0000a;
  --red-glow:   rgba(232,0,13,0.18);
  --bg:         #0d0d0d;
  --sidebar-bg: #111111;
  --card-bg:    #181818;
  --border:     #232323;
  --text:       #ffffff;
  --text-dim:   #aaaaaa;
  --text-muted: #666666;
  --radius:     14px;
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle noise grain */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999; opacity:.5;
}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
nav {
  position: sticky; top:0; z-index:100;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 62px;
  padding: 0 1.8rem;
  background: rgba(13,13,13,0.96);
  backdrop-filter: blur(14px);
  border-bottom: 2px solid var(--red);
}

.nav-left  { display:flex; align-items:center; gap:.8rem; }
.nav-center { display:flex; align-items:center; justify-content:center; }
.nav-right { display:flex; align-items:center; justify-content:flex-end; gap:1rem; }

/* search bar */
.nav-search {
  display: flex; align-items: center; gap:.5rem;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: .35rem .8rem;
}
.nav-search input {
  background: none; border:none; outline:none;
  color: var(--text); font-family:'Barlow',sans-serif;
  font-size: .82rem; width: 160px;
}
.nav-search input::placeholder { color: var(--text-muted); }
.nav-search svg { opacity:.4; flex-shrink:0; }

/* center logo */
.nav-logo-img {
  height: 30px; width:auto; object-fit:contain;
}
.nav-logo-text {
  font-family:'Montserrat',sans-serif;
  font-size:1.5rem; font-weight:900;
  letter-spacing:.12em;
  color: var(--red);
  text-decoration:none;
  display:none;
}

/* about us link */
.nav-about {
  font-family:'Barlow',sans-serif;
  font-size:.82rem; letter-spacing:.06em;
  color: var(--text-dim);
  text-decoration:none;
  transition: color .2s;
}
.nav-about:hover { color:var(--text); }

/* pfp */
.pfp-wrap {
  width:38px; height:38px;
  border-radius:50%;
  border:2px solid var(--red);
  overflow:hidden; cursor:pointer;
  transition: box-shadow .2s;
  flex-shrink:0;
}
.pfp-wrap:hover { box-shadow:0 0 16px var(--red-glow); }
.pfp-wrap img   { width:100%; height:100%; object-fit:cover; }
.pfp-placeholder {
  width:100%; height:100%;
  background:#1e1e1e;
  display:flex; align-items:center; justify-content:center;
  font-family:'Montserrat',sans-serif;
  font-weight:800; font-size:.85rem;
  color:var(--red);
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.layout {
  display:flex;
  min-height:calc(100vh - 62px);
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
aside {
  width: 190px; flex-shrink:0;
  background: var(--sidebar-bg);
  border-right: 2px solid var(--red);
  position: sticky; top:62px;
  height: calc(100vh - 62px);
  overflow-y:auto; overflow-x:visible;
  padding: 1.6rem 0 2rem;
  z-index:50;
}

.sidebar-hero {
  padding: 0 1.2rem 1.4rem;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 1.4rem;
}

.sidebar-hero-label {
  font-family:'Montserrat',sans-serif;
  font-size:.65rem; font-weight:700;
  letter-spacing:.22em; text-transform:uppercase;
  color: var(--text-dim); margin-bottom:.25rem;
}

.sidebar-hero-title {
  font-family:'Montserrat',sans-serif;
  font-size:1.05rem; font-weight:900;
  text-transform:uppercase; line-height:1.1;
  color:var(--text);
}

.sidebar-hero-rides {
  font-family:'Montserrat',sans-serif;
  font-size:1.6rem; font-weight:900;
  font-style:italic;
  color:var(--red);
  line-height:1;
}

/* ── accordion trigger ── */
.filter-section { position:relative; }

.filter-trigger {
  display:flex; align-items:center; justify-content:space-between;
  width:100%;
  background: none; border:none;
  padding: .6rem 1.2rem;
  cursor:pointer;
  color: var(--text-dim);
  transition: color .2s, background .2s;
}
.filter-trigger:hover { color:var(--text); background:rgba(255,255,255,.03); }

.filter-trigger.open {
  color: var(--text);
}

/* pill-style label */
.filter-trigger-pill {
  background: var(--red);
  color:#fff;
  font-family:'Montserrat',sans-serif;
  font-size:.7rem; font-weight:800;
  letter-spacing:.14em; text-transform:uppercase;
  padding:.28rem .8rem;
  border-radius:4px;
  transition: background .2s;
}

.filter-trigger.open .filter-trigger-pill,
.filter-trigger:hover .filter-trigger-pill {
  background: var(--red-dark);
}

.filter-chevron {
  width:13px; height:13px; flex-shrink:0;
  transition: transform .25s ease;
  color:var(--text-muted);
  margin-left:.3rem;
}
.filter-trigger.open .filter-chevron { transform:rotate(180deg); }

/* active value hint */
.filter-active-hint {
  font-family:'Oswald',sans-serif;
  font-size:.62rem; letter-spacing:.1em;
  color:var(--red); text-transform:uppercase;
  padding: .15rem 1.2rem .5rem;
  display:none;
}
.filter-active-hint.visible { display:block; }

/* flat list under trigger */
.filter-list {
  list-style:none;
  padding: .3rem 0 .6rem;
  display:none;
}
.filter-list.open { display:block; }

.filter-list li {
  font-family:'Oswald',sans-serif;
  font-size:.88rem; font-weight:500;
  letter-spacing:.12em; text-transform:uppercase;
  color: var(--text-dim);
  padding: .42rem 1.4rem .42rem 1.8rem;
  cursor:pointer;
  transition: color .15s, padding-left .15s;
  position:relative;
}
.filter-list li::before {
  content:'';
  position:absolute; left:1.2rem; top:50%;
  transform:translateY(-50%);
  width:4px; height:4px; border-radius:50%;
  background:var(--red);
  opacity:0; transition:opacity .15s;
}
.filter-list li:hover { color:var(--text); padding-left:2rem; }
.filter-list li:hover::before { opacity:1; }
.filter-list li.active { color:var(--red); padding-left:2rem; }
.filter-list li.active::before { opacity:1; }

.filter-sep {
  height:1px; background:#222;
  margin: .3rem 1.2rem;
}

.clear-btn {
  display:block; width:100%;
  background:none; border:none;
  padding: .5rem 1.2rem;
  margin-top:.6rem;
  font-family:'Montserrat',sans-serif;
  font-size:.58rem; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase;
  color:var(--text-muted);
  cursor:pointer; text-align:left;
  transition: color .2s;
}
.clear-btn:hover { color:var(--red); }

/* ══════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════ */
main {
  flex:1;
  padding: 2.2rem 2.4rem 5rem;
}

/* headline */
.headline { margin-bottom:2rem; }

.headline-top {
  font-family:'Montserrat',sans-serif;
  font-size:clamp(1.6rem,3vw,2.2rem);
  font-weight:800; line-height:1.1;
  color:var(--text);
}

.headline-top .username {
  background: var(--red);
  color:#fff;
  padding:.06em .3em;
  display:inline;
  font-style:normal;
}

.headline-sub-line {
  font-family:'Montserrat',sans-serif;
  font-size:clamp(1rem,2vw,1.3rem);
  font-weight:700; color:var(--text);
  margin-top:.2rem;
}

.headline-count {
  font-family:'Oswald',sans-serif;
  font-size:.75rem; letter-spacing:.18em;
  color:var(--text-muted); margin-top:.5rem;
  text-transform:uppercase;
}

/* active filter tag */
.active-tag-row {
  display:flex; gap:.5rem; flex-wrap:wrap;
  margin-bottom:1.4rem; min-height:26px;
}

.af-tag {
  font-family:'Montserrat',sans-serif;
  font-size:.6rem; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase;
  padding:.22rem .7rem;
  border:1.5px solid var(--red);
  color:var(--red);
  background: var(--red-glow);
  display:flex; align-items:center; gap:.4rem;
  border-radius:4px;
}
.af-tag button {
  background:none; border:none;
  color:var(--red); cursor:pointer;
  font-size:.75rem; font-family:'Montserrat',sans-serif;
  font-weight:800; line-height:1; padding:0;
}

/* ══════════════════════════════════════
   RIDE GRID
══════════════════════════════════════ */
.rides-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
  gap:1.4rem;
}

/* ── Ride Card ── */
.ride-card {
  position:relative;
  border-radius: var(--radius);
  overflow:hidden;
  aspect-ratio: 3/4;
  display:block;
  text-decoration:none;
  cursor:pointer;
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  transition: transform .28s ease, border-color .28s ease, box-shadow .28s ease;
  animation: card-in .4s ease both;
}

.ride-card:hover {
  transform: translateY(-5px) scale(1.01);
  border-color: var(--red);
  box-shadow: 0 16px 40px rgba(0,0,0,.6), 0 0 0 1px var(--red-glow);
}

/* banner */
.card-img {
  position:absolute; inset:0;
  width:100%; height:100%; object-fit:cover;
  transition: filter .35s ease, transform .35s ease;
}
.ride-card:hover .card-img {
  filter: brightness(.22) saturate(.25);
  transform: scale(1.06);
}

/* no-image placeholder */
.card-img-placeholder {
  position:absolute; inset:0;
  background: linear-gradient(145deg,#1c1c1c,#0d0d0d);
  display:flex; align-items:center; justify-content:center;
  transition:filter .35s;
}
.ride-card:hover .card-img-placeholder { filter:brightness(.4); }
.card-img-placeholder svg { opacity:.06; width:72px; }

/* gradient vignette always-on */
.card-vignette {
  position:absolute; inset:0;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.1) 55%, transparent 100%);
  border-radius: var(--radius);
  z-index:1;
  transition: opacity .3s;
}
.ride-card:hover .card-vignette { opacity:0; }

/* default state: title at bottom */
.card-default {
  position:absolute; bottom:0; left:0; right:0;
  padding:1rem 1rem .9rem;
  z-index:2;
  transition: opacity .25s;
}
.ride-card:hover .card-default { opacity:0; pointer-events:none; }

.card-title-default {
  font-family:'Montserrat',sans-serif;
  font-size:1rem; font-weight:800;
  line-height:1.2;
  color:#fff;
  text-shadow: 0 2px 8px rgba(0,0,0,.8);
}

/* hover state: full overlay */
.card-hover-content {
  position:absolute; inset:0;
  padding:1.3rem;
  z-index:3;
  display:flex; flex-direction:column; justify-content:center;
  opacity:0;
  transition: opacity .3s ease;
}
.ride-card:hover .card-hover-content { opacity:1; }

.ch-title {
  font-family:'Montserrat',sans-serif;
  font-size:1.2rem; font-weight:800;
  line-height:1.2; color:#fff;
  margin-bottom:.6rem;
  transform:translateY(10px);
  transition: transform .3s ease .04s;
}
.ride-card:hover .ch-title { transform:translateY(0); }

.ch-desc {
  font-family:'Barlow',sans-serif;
  font-size:.78rem; color:rgba(255,255,255,.75);
  line-height:1.6; margin-bottom:.9rem;
  display:-webkit-box;
  -webkit-line-clamp:5;
  -webkit-box-orient:vertical;
  overflow:hidden;
  transform:translateY(10px);
  transition: transform .3s ease .09s;
}
.ride-card:hover .ch-desc { transform:translateY(0); }

.ch-difficulty {
  font-family:'Oswald',sans-serif;
  font-size:.95rem; font-weight:600;
  letter-spacing:.08em;
  transform:translateY(10px);
  transition: transform .3s ease .14s;
}
.ride-card:hover .ch-difficulty { transform:translateY(0); }

/* difficulty colors matching reference */
.diff-Easy     { color: #2ecc71; }
.diff-Moderate { color: #f0b429; }
.diff-Hard     { color: #e67e22; }
.diff-Extreme  { color: var(--red); }

/* type chip */
.card-type-chip {
  position:absolute; top:10px; left:10px; z-index:4;
  font-family:'Montserrat',sans-serif;
  font-size:.55rem; font-weight:800;
  letter-spacing:.14em; text-transform:uppercase;
  background: var(--red);
  color:#fff;
  padding:.18rem .55rem;
  border-radius:4px;
  transition:opacity .3s;
}
.ride-card:hover .card-type-chip { opacity:0; }

/* ══════════════════════════════════════
   LOAD MORE
══════════════════════════════════════ */
.load-more-wrap {
  display:flex; justify-content:center;
  margin-top:2.4rem;
}

.load-more-btn {
  font-family:'Montserrat',sans-serif;
  font-size:.78rem; font-weight:800;
  letter-spacing:.18em; text-transform:uppercase;
  color:#fff; background:none;
  border:2px solid var(--red);
  padding:.7rem 2.2rem;
  cursor:pointer; border-radius:6px;
  position:relative; overflow:hidden;
  transition: color .25s, box-shadow .25s;
}
.load-more-btn::before {
  content:'';
  position:absolute; inset:0;
  background:var(--red);
  transform:scaleX(0); transform-origin:left;
  transition:transform .25s ease;
  z-index:-1;
}
.load-more-btn:hover::before { transform:scaleX(1); }
.load-more-btn:hover { box-shadow:0 0 24px var(--red-glow); }

/* ══════════════════════════════════════
   STATES
══════════════════════════════════════ */
.state-container {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:320px; gap:1rem;
}
.state-icon { font-size:2.5rem; opacity:.18; }
.state-text {
  font-family:'Oswald',sans-serif;
  font-size:.82rem; letter-spacing:.2em;
  color:var(--text-muted); text-transform:uppercase;
}

.loading-dots { display:flex; gap:7px; }
.loading-dots span {
  width:7px; height:7px;
  background:var(--red); border-radius:50%;
  animation:dot-pulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay:.2s; }
.loading-dots span:nth-child(3) { animation-delay:.4s; }

@keyframes dot-pulse {
  0%,80%,100% { opacity:.2; transform:scale(.8); }
  40%         { opacity:1;  transform:scale(1); }
}

@keyframes card-in {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

/* scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
</style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav>
  <div class="nav-left">
    <div class="nav-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search for Rides..." id="searchInput">
    </div>
  </div>

  <div class="nav-center">
    <img class="nav-logo-img" src="./public/images/rs-logo-04-04.png" alt="RideSync" id="navLogoImg">
    <a href="#" class="nav-logo-text" id="navLogoFallback">RIDESYNC</a>
  </div>

  <div class="nav-right">
    <a href="/about" class="nav-about">About us</a>
    <div class="pfp-wrap" id="pfpWrap">
      <div class="pfp-placeholder" id="pfpPlaceholder">?</div>
    </div>
  </div>
</nav>

<!-- ══ LAYOUT ══ -->
<div class="layout">

  <!-- ══ SIDEBAR ══ -->
  <aside id="sidebar">

    <div class="sidebar-hero">
      <div class="sidebar-hero-label">Personalize</div>
      <div class="sidebar-hero-title">Your</div>
      <div class="sidebar-hero-rides">RIDES</div>
    </div>

    <!-- DIFFICULTY accordion -->
    <div class="filter-section">
      <button class="filter-trigger open" id="diffTrigger" aria-expanded="true">
        <span class="filter-trigger-pill">Difficulty</span>
        <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="filter-active-hint" id="diffHint"></div>
      <ul class="filter-list open" id="diffList">
        <li data-filter="difficulty" data-value="Easy">Easy</li>
        <li data-filter="difficulty" data-value="Moderate">Moderate</li>
        <li data-filter="difficulty" data-value="Hard">Hard</li>
        <li data-filter="difficulty" data-value="Extreme">Extreme</li>
      </ul>
    </div>

    <div class="filter-sep"></div>

    <!-- TYPE accordion -->
    <div class="filter-section">
      <button class="filter-trigger" id="typeTrigger" aria-expanded="false">
        <span class="filter-trigger-pill">Type ›</span>
        <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="filter-active-hint" id="typeHint"></div>
      <ul class="filter-list" id="typeList">
        <li data-filter="type" data-value="Adventure">Adventure</li>
        <li data-filter="type" data-value="OffRoad">Offroad</li>
        <li data-filter="type" data-value="Highway">Highway</li>
        <li data-filter="type" data-value="City">City</li>
      </ul>
    </div>

    <div class="filter-sep"></div>

    <button class="clear-btn" id="clearFilters">✕ &nbsp;Clear filter</button>
  </aside>

  <!-- ══ MAIN ══ -->
  <main>
    <div class="headline">
      <div class="headline-top">
        Ready to ride <span class="username" id="usernameDisplay">Rider</span>
      </div>
      <div class="headline-sub-line">Showing All Upcoming Rides</div>
      <div class="headline-count" id="headlineCount">// loading...</div>
    </div>

    <div class="active-tag-row" id="activeTagRow"></div>

    <div id="ridesContainer">
      <div class="state-container">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="state-text">Fetching rides</div>
      </div>
    </div>

    <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
      <button class="load-more-btn" id="loadMoreBtn">Load More Rides</button>
    </div>
  </main>
</div>

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const PAGE_SIZE  = 4;
const BASE_URL   = 'http://localhost:3000/rides';

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let fetchedRides  = [];   // raw from last API call
let shownCount    = PAGE_SIZE;
let activeFilter  = null; // { group, value } — one at a time
let searchQuery   = '';
let cachedCoords  = null; // { lat, lng } once resolved

// ════════════════════════════════════════════
// LOGO FALLBACK
// ════════════════════════════════════════════
const navLogoImg      = document.getElementById('navLogoImg');
const navLogoFallback = document.getElementById('navLogoFallback');

navLogoImg.addEventListener('error', () => {
  navLogoImg.style.display      = 'none';
  navLogoFallback.style.display = 'block';
});

// ════════════════════════════════════════════
// USER  (localStorage)
// ════════════════════════════════════════════
function loadUser() {
  const username = localStorage.getItem('username')
                || localStorage.getItem('userName')
                || 'Rider';
  const pfp = localStorage.getItem('pfp');

  document.getElementById('usernameDisplay').textContent = username;

  const wrap    = document.getElementById('pfpWrap');
  const initial = username[0].toUpperCase();

  if (pfp) {
    wrap.innerHTML = `<img src="${pfp}" alt="pfp"
      onerror="this.parentElement.innerHTML='<div class=pfp-placeholder>${initial}</div>'">`;
  } else {
    wrap.innerHTML = `<div class="pfp-placeholder">${initial}</div>`;
  }
}

// ════════════════════════════════════════════
// GEOLOCATION  (resolved once, cached)
// ════════════════════════════════════════════
function getCoords() {
  // Return cached coords if already resolved
  if (cachedCoords) return Promise.resolve(cachedCoords);

  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        cachedCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        resolve(cachedCoords);
      },
      err => {
        console.warn('Geolocation unavailable:', err.message);
        resolve(null);
      },
      { enableHighAccuracy: true, timeout: 20000 }
    );
  });
}

// Build query string with optional lat/lng
function buildQuery(params = {}) {
  const qs = new URLSearchParams(params);
  return qs.toString() ? `?${qs}` : '';
}

// ════════════════════════════════════════════
// FETCH — calls the right route per filter
// ════════════════════════════════════════════
async function fetchRides() {
  showLoading();

  const coords = await getCoords();

  // Base coord params (only included when we have them)
  const coordParams = coords ? { lat: coords.lat, lng: coords.lng } : {};

  let url;

  if (!activeFilter) {
    // No filter → /rider_rides
    url = `${BASE_URL}/rider_rides${buildQuery(coordParams)}`;

  } else if (activeFilter.group === 'difficulty') {
    // Difficulty filter → /ride_difficulty?diff=Hard&lat=x&lng=y
    url = `${BASE_URL}/ride_difficulty${buildQuery({ diff: activeFilter.value, ...coordParams })}`;

  } else if (activeFilter.group === 'type') {
    // Type filter → /ride_type?type=Adventure&lat=x&lng=y
    url = `${BASE_URL}/ride_type${buildQuery({ type: activeFilter.value, ...coordParams })}`;
  }

  try {
    const res  = await fetch(url, { credentials: 'include' });
    const json = await res.json();
    console.log(json);
    if (!json.success) throw new Error('API error');

    fetchedRides = json.data;
    console.log(fetchRides);
    shownCount = PAGE_SIZE;
    renderRides();

  } catch (err) {
    console.error('fetchRides:', err);
    showError();
  }
}

// ════════════════════════════════════════════
// CLIENT-SIDE SEARCH  (on already-fetched data)
// ════════════════════════════════════════════
function getVisibleRides() {
  const q = searchQuery.toLowerCase().trim();
  if (!q) return fetchedRides;

  return fetchedRides.filter(r => {
    const haystack = `${r.title} ${r.type} ${r.difficulty} ${r.startAddress||''} ${r.endAddress||''}`.toLowerCase();
    return haystack.includes(q);
  });
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function renderRides() {
  const container    = document.getElementById('ridesContainer');
  const loadWrap     = document.getElementById('loadMoreWrap');
  const visibleRides = getVisibleRides();

  document.getElementById('headlineCount').textContent =
    `// ${visibleRides.length} ride${visibleRides.length !== 1 ? 's' : ''} found`;

  renderActiveTag();

  if (visibleRides.length === 0) {
    container.innerHTML = `
      <div class="state-container">
        <div class="state-icon">◈</div>
        <div class="state-text">No rides match your filters</div>
      </div>`;
    loadWrap.style.display = 'none';
    return;
  }

  const visible = visibleRides.slice(0, shownCount);
  container.innerHTML = `<div class="rides-grid">
    ${visible.map((r, i) => cardHTML(r, i)).join('')}
  </div>`;

  if (shownCount < visibleRides.length) {
    loadWrap.style.display = 'flex';
    document.getElementById('loadMoreBtn').textContent =
      `Load More Rides (${visibleRides.length - shownCount} left)`;
  } else {
    loadWrap.style.display = 'none';
  }
}

// ── Card HTML ──
function cardHTML(ride, index) {
  const title  = ride.title || 'Untitled Ride';
  const desc   = ride.description
               || `A ${ride.type||''} ride — ${ride.startAddress||'start'} to ${ride.endAddress||'destination'}.`;
  const banner = ride.banner;
  const diff   = ride.difficulty || '';
  const type   = ride.type || '';

  const imgHTML = banner
    ? `<img class="card-img" src="${banner}" alt="${title}" loading="lazy">`
    : `<div class="card-img-placeholder">
        <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 50 Q40 10 70 50" stroke="#fff" stroke-width="2" fill="none"/>
          <circle cx="20" cy="40" r="8" stroke="#fff" stroke-width="2" fill="none"/>
          <circle cx="60" cy="40" r="8" stroke="#fff" stroke-width="2" fill="none"/>
        </svg>
      </div>`;

  return `
  <a class="ride-card" href="/rides/${ride._id}" style="animation-delay:${index * 0.07}s">
    ${imgHTML}
    <div class="card-vignette"></div>
    ${type ? `<div class="card-type-chip">${type}</div>` : ''}
    <div class="card-default">
      <div class="card-title-default">${title}</div>
    </div>
    <div class="card-hover-content">
      <div class="ch-title">${title}</div>
      <div class="ch-desc">${desc}</div>
      ${diff ? `<div class="ch-difficulty diff-${diff}">${diff}</div>` : ''}
    </div>
  </a>`;
}

// ════════════════════════════════════════════
// ACTIVE FILTER TAG
// ════════════════════════════════════════════
function renderActiveTag() {
  const row = document.getElementById('activeTagRow');
  if (!activeFilter) { row.innerHTML = ''; return; }

  const label = activeFilter.group === 'type'
    ? `TYPE: ${activeFilter.value}`
    : `DIFF: ${activeFilter.value}`;

  row.innerHTML = `
    <div class="af-tag">
      ${label}
      <button onclick="clearAllFilters()">✕</button>
    </div>`;
}

// ════════════════════════════════════════════
// ACCORDION / FILTER INTERACTIONS
// ════════════════════════════════════════════
function toggleAccordion(triggerId, listId) {
  const trigger = document.getElementById(triggerId);
  const list    = document.getElementById(listId);
  const isOpen  = trigger.classList.contains('open');

  document.querySelectorAll('.filter-trigger').forEach(t => {
    t.classList.remove('open');
    t.setAttribute('aria-expanded', 'false');
  });
  document.querySelectorAll('.filter-list').forEach(l => l.classList.remove('open'));

  if (!isOpen) {
    trigger.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
    list.classList.add('open');
  }
}

document.getElementById('diffTrigger').addEventListener('click', e => {
  e.stopPropagation();
  toggleAccordion('diffTrigger', 'diffList');
});

document.getElementById('typeTrigger').addEventListener('click', e => {
  e.stopPropagation();
  toggleAccordion('typeTrigger', 'typeList');
});

// Filter item click → hit backend
document.querySelectorAll('.filter-list li').forEach(li => {
  li.addEventListener('click', () => {
    const group = li.dataset.filter;
    const value = li.dataset.value;

    // Toggle off if same value clicked again
    if (activeFilter && activeFilter.group === group && activeFilter.value === value) {
      activeFilter = null;
    } else {
      activeFilter = { group, value };
    }

    syncFilterUI();
    fetchRides(); // ← hits the appropriate backend route
  });
});

function syncFilterUI() {
  document.querySelectorAll('.filter-list li').forEach(li => li.classList.remove('active'));
  document.getElementById('diffHint').textContent = '';
  document.getElementById('diffHint').classList.remove('visible');
  document.getElementById('typeHint').textContent = '';
  document.getElementById('typeHint').classList.remove('visible');

  if (!activeFilter) return;

  const { group, value } = activeFilter;

  document.querySelectorAll(`.filter-list li[data-filter="${group}"][data-value="${value}"]`)
    .forEach(li => li.classList.add('active'));

  const hintEl = document.getElementById(group === 'type' ? 'typeHint' : 'diffHint');
  hintEl.textContent = `● ${value}`;
  hintEl.classList.add('visible');
}

function clearAllFilters() {
  activeFilter = null;
  searchQuery  = '';
  document.getElementById('searchInput').value = '';
  syncFilterUI();
  fetchRides(); // ← re-fetch unfiltered from backend
}

document.getElementById('clearFilters').addEventListener('click', clearAllFilters);

// ════════════════════════════════════════════
// SEARCH  (client-side on already-fetched data)
// ════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  shownCount  = PAGE_SIZE;
  renderRides(); // no new fetch — just re-render with search applied
});

// ════════════════════════════════════════════
// LOAD MORE
// ════════════════════════════════════════════
document.getElementById('loadMoreBtn').addEventListener('click', () => {
  shownCount += PAGE_SIZE;
  renderRides();
  const grid = document.querySelector('.rides-grid');
  if (grid) {
    const newCard = grid.children[shownCount - PAGE_SIZE];
    if (newCard) newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

// ════════════════════════════════════════════
// UI STATES
// ════════════════════════════════════════════
function showLoading() {
  document.getElementById('ridesContainer').innerHTML = `
    <div class="state-container">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="state-text">Fetching rides</div>
    </div>`;
  document.getElementById('loadMoreWrap').style.display = 'none';
  document.getElementById('headlineCount').textContent  = '// loading...';
}

function showError() {
  document.getElementById('ridesContainer').innerHTML = `
    <div class="state-container">
      <div class="state-icon">⚠</div>
      <div class="state-text">Could not reach server</div>
    </div>`;
  document.getElementById('headlineCount').textContent = '// connection failed';
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
loadUser();
fetchRides();
</script>
