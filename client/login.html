<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideSync — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS (mirrored from signup)
    ═══════════════════════════════════════════════ */
    :root {
      --black:        #000000;
      --white:        #ffffff;
      --orange:       #ff4d00;
      --orange-dim:   rgba(255, 77, 0, 0.12);
      --orange-mid:   rgba(255, 77, 0, 0.35);

      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-400: #999999;
      --gray-600: #555555;
      --gray-800: #1a1a1a;

      --font-head: 'Montserrat', sans-serif;
      --font-body: 'Roboto', sans-serif;

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;

      --shadow-sm:     0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:     0 6px 24px rgba(0,0,0,0.1);
      --shadow-lg:     0 16px 48px rgba(0,0,0,0.14);
      --shadow-orange: 0 4px 20px rgba(255,77,0,0.25);

      --transition:      0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s  cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       SPLIT LAYOUT
    ═══════════════════════════════════════════════ */
    .split-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── LEFT: IMAGE ── */
    .split-image {
      flex: 0 0 50%;
      position: relative;
      overflow: hidden;
      background: var(--black);
    }

    .split-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.65;
      transition: opacity 0.3s;
    }

    .image-fallback {
      background: linear-gradient(135deg, #111 0%, #1a1a1a 40%, #ff4d00 100%);
    }

    .image-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 8px var(--orange));
    }

    .brand-name {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .image-tagline p {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    /* ── RIGHT: FORM ── */
    .split-form {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      background: var(--white);
    }

    .form-container {
      width: 100%;
      max-width: 420px;
    }

    .form-header {
      margin-bottom: 36px;
    }

    .form-title {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .form-subtitle {
      font-size: 14px;
      color: var(--gray-600);
      font-weight: 400;
    }

    /* ═══════════════════════════════════════════════
       FORM FIELDS
    ═══════════════════════════════════════════════ */
    .field-group { margin-bottom: 22px; }

    .field-label {
      display: block;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .field-input {
      width: 100%;
      height: 50px;
      padding: 0 48px 0 16px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--black);
      background: var(--gray-100);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color var(--transition),
                  background var(--transition),
                  box-shadow var(--transition);
      -webkit-appearance: none;
    }

    .field-input::placeholder { color: var(--gray-400); }

    .field-input:focus {
      background: var(--white);
      border-color: var(--orange);
      box-shadow: 0 0 0 4px var(--orange-dim);
    }

    .field-input.invalid {
      border-color: #ef4444;
      background: #fef2f2;
    }

    /* ── password toggle ── */
    .toggle-pw {
      position: absolute;
      right: 0; top: 0;
      width: 50px; height: 50px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--orange); }
    .eye-icon { width: 18px; height: 18px; }

    /* ── field error ── */
    .field-error {
      font-size: 12px;
      color: #ef4444;
      margin-top: 5px;
      min-height: 16px;
      font-weight: 500;
    }

    /* ── forgot link ── */
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--orange);
      text-decoration: none;
      font-family: var(--font-head);
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: opacity var(--transition);
    }
    .forgot-link:hover { opacity: 0.7; }

    /* ═══════════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════════ */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--gray-400);
      font-size: 12px;
      font-family: var(--font-head);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ═══════════════════════════════════════════════
       GOOGLE BUTTON
    ═══════════════════════════════════════════════ */
    .btn-google {
      width: 100%;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-800);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: border-color var(--transition),
                  box-shadow var(--transition),
                  background var(--transition);
      text-decoration: none;
      margin-bottom: 0;
    }
    .btn-google:hover {
      border-color: var(--gray-400);
      box-shadow: var(--shadow-sm);
      background: var(--gray-100);
    }
    .google-logo {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════
       PRIMARY BUTTON
    ═══════════════════════════════════════════════ */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 52px;
      padding: 0 28px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition),
                  box-shadow var(--transition),
                  transform var(--transition);
      box-shadow: var(--shadow-orange);
    }
    .btn-primary:hover:not(:disabled) {
      background: #e64400;
      box-shadow: 0 6px 24px rgba(255,77,0,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-arrow { font-size: 16px; transition: transform var(--transition); }
    .btn-primary:hover:not(:disabled) .btn-arrow { transform: translateX(4px); }

    /* loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════════
       BOTTOM LINK
    ═══════════════════════════════════════════════ */
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13.5px;
      color: var(--gray-600);
    }
    .signup-link a {
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
      font-family: var(--font-head);
      transition: opacity var(--transition);
    }
    .signup-link a:hover { opacity: 0.7; }

    /* ═══════════════════════════════════════════════
       ERROR BANNER
    ═══════════════════════════════════════════════ */
    .error-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #b91c1c;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }
    .error-banner.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .error-banner-icon { font-size: 15px; flex-shrink: 0; }

    /* ═══════════════════════════════════════════════
       SUCCESS OVERLAY
    ═══════════════════════════════════════════════ */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .success-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .success-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 56px 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-lg);
    }
    .success-overlay.visible .success-card { transform: scale(1) translateY(0); }
    .success-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--orange);
      color: var(--white);
      font-size: 32px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }
    @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    .success-card h2 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    .success-card p {
      color: var(--gray-600);
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .success-card .btn-primary { width: auto; padding: 0 28px; margin: 0 auto; }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .split-layout { flex-direction: column; }
      .split-image { flex: 0 0 220px; height: 220px; }
      .image-tagline p { font-size: 26px; }
      .split-form { padding: 32px 20px; }
      .form-title { font-size: 26px; }
    }
    @media (max-width: 480px) {
      .form-container { max-width: 100%; }
      .success-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════
       SPLIT LAYOUT
  ═══════════════════════════════════ -->
  <div class="split-layout">

    <!-- LEFT: IMAGE -->
    <div class="split-image">
      <img src="./public/images/login-page-1.jpg" alt="Login visual"
           onerror="this.parentElement.classList.add('image-fallback')" />
      <div class="image-overlay">
        <div class="brand-mark">
          <span class="brand-icon">⚡</span>
          <span class="brand-name">RideSync</span>
        </div>
        <div class="image-tagline">
          <p>Welcome<br/>back,<br/>rider.</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: FORM -->
    <div class="split-form">
      <div class="form-container">

        <div class="form-header">
          <h1 class="form-title">Sign in</h1>
          <p class="form-subtitle">Good to see you again. Let's get moving.</p>
        </div>

        <!-- Error banner -->
        <div class="error-banner" id="errorBanner">
          <span class="error-banner-icon">⚠</span>
          <span id="errorText">Invalid username or password.</span>
        </div>

        <form id="loginForm" novalidate>

          <!-- Username -->
          <div class="field-group" id="fg-username">
            <label class="field-label" for="username">Username</label>
            <div class="input-wrap">
              <input
                class="field-input"
                type="text"
                id="username"
                name="username"
                placeholder="your_username"
                autocomplete="username"
                autocapitalize="none"
                spellcheck="false"
              />
            </div>
            <div class="field-error" id="err-username"></div>
          </div>

          <!-- Password -->
          <div class="field-group" id="fg-password">
            <div class="field-row">
              <label class="field-label" for="password" style="margin-bottom:0">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrap" style="margin-top:8px">
              <input
                class="field-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="field-error" id="err-password"></div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary" id="btnLogin">
            <span id="btnText">Sign In</span>
            <span class="btn-arrow">→</span>
          </button>

        </form>

        <div class="divider">or</div>

        <!-- Google OAuth -->
        <a href="http://localhost:3000/auth/google" class="btn-google">
          <svg class="google-logo" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
          </svg>
          Continue with Google
        </a>

        <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>

      </div>
    </div>
  </div>

  <!-- SUCCESS OVERLAY -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2>Welcome back!</h2>
      <p>You're signed in. Let's ride.</p>
      <button class="btn-primary" onclick="location.href='/'">Go to Dashboard →</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const form       = document.getElementById('loginForm');
      const btn        = document.getElementById('btnLogin');
      const btnText    = document.getElementById('btnText');
      const togglePw   = document.getElementById('togglePw');
      const pwInput    = document.getElementById('password');
      const userInput  = document.getElementById('username');
      const errorBanner = document.getElementById('errorBanner');
      const errorText   = document.getElementById('errorText');

      /* ── Toggle password visibility ── */
      togglePw.addEventListener('click', () => {
        const isText = pwInput.type === 'text';
        pwInput.type = isText ? 'password' : 'text';
        togglePw.style.color = isText ? '' : 'var(--orange)';
      });

      /* ── Hide error banner on input ── */
      [userInput, pwInput].forEach(el => {
        el.addEventListener('input', () => {
          errorBanner.classList.remove('visible');
          el.classList.remove('invalid');
        });
      });

      /* ── Show error ── */
      function showError(message) {
        errorText.textContent = message;
        errorBanner.classList.add('visible');
        userInput.classList.add('invalid');
        pwInput.classList.add('invalid');
        // reset button
        btn.disabled = false;
        btn.innerHTML = `<span>Try again</span><span class="btn-arrow">→</span>`;
        btn.style.background = '#ef4444';
        setTimeout(() => {
          btn.style.background = '';
          btn.innerHTML = `<span>Sign In</span><span class="btn-arrow">→</span>`;
        }, 2500);
      }

      /* ── Client-side validation ── */
      function validate() {
        const u = userInput.value.trim();
        const p = pwInput.value;

        if (!u) {
          document.getElementById('err-username').textContent = 'Username is required.';
          userInput.classList.add('invalid');
          return false;
        }
        document.getElementById('err-username').textContent = '';
        userInput.classList.remove('invalid');

        if (!p) {
          document.getElementById('err-password').textContent = 'Password is required.';
          pwInput.classList.add('invalid');
          return false;
        }
        document.getElementById('err-password').textContent = '';
        pwInput.classList.remove('invalid');

        return true;
      }

      /* ── Submit ── */
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validate()) return;

        // Loading state
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div><span>Signing in…</span>`;

        const payload = {
          username: userInput.value.trim(),
          password: pwInput.value,
        };

        try {
          const res = await fetch('http://localhost:3000/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',           // send/receive httpOnly cookies
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            document.getElementById('successOverlay').classList.add('visible');
          } else {
            const data = await res.json().catch(() => ({}));
            showError(data.message || `Login failed (${res.status}). Please try again.`);
          }
        } catch (err) {
          console.error('Login request failed:', err);
          showError('Could not reach the server. Check your connection.');
          btn.disabled = false;
          btn.innerHTML = `<span>Sign In</span><span class="btn-arrow">→</span>`;
        }
      });

    })();
  </script>
</body>
</html>
