</head>

<body>

<div class="form">
<h2>Create Ride</h2>

<label>Banner Image</label> <input type="file" id="banner" accept="image/*">

<label>Title</label> <input id="title">

<!-- START -->

<label>Start Location</label> <input id="startSearch" placeholder="Search start location...">

<div id="startDropdown" class="dropdown"></div>
<div id="startMap" class="map-box"></div>

<!-- END -->

<label>End Location</label> <input id="endSearch" placeholder="Search end location...">

<div id="endDropdown" class="dropdown"></div>
<div id="endMap" class="map-box"></div>

<label>Entry Fee</label> <input id="entryFee" type="number">

<label>Start Date</label> <input id="startDate" type="date">

<label>End Date</label> <input id="endDate" type="date">

<label>Time</label> <input id="time">

<label>Length (km)</label> <input id="length" type="number">

<label>Difficulty</label> <select id="difficulty">

<option>Easy</option>
<option>Moderate</option>
<option>Hard</option>
<option>Extreme</option>
</select>

<label>Type</label> <select id="type">

<option>Adventure</option>
<option>Highway</option>
<option>City</option>
<option>OffRoad</option>
</select>

<label>Max Seats</label> <input id="maxSeats" type="number">

<label>Status</label> <select id="status">

<option>Upcoming</option>
<option>Ongoing</option>
<option>Cancelled</option>
<option>Completed</option>
</select>

<label>Communication Link</label> <input id="communicationLink">

<label>Communication Type</label> <select id="communicationType">

<option>telegram</option>
<option>whatsapp</option>
<option>instagram</option>
</select>

<button onclick="submitRide()">Create Ride</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let startLocation=null,endLocation=null;
let startAddress="", endAddress="";

let startMap, endMap;
let startMarker=null, endMarker=null;

function initMaps(){
    startMap=L.map('startMap').setView([28.6,77.2],5);
    endMap=L.map('endMap').setView([28.6,77.2],5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(startMap);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(endMap);

    startMap.on('click',e=>{
        startLocation=e.latlng;
        if(startMarker) startMap.removeLayer(startMarker);
        startMarker=L.marker(e.latlng).addTo(startMap);
    });

    endMap.on('click',e=>{
        endLocation=e.latlng;
        if(endMarker) endMap.removeLayer(endMarker);
        endMarker=L.marker(e.latlng).addTo(endMap);
    });
}

window.onload=initMaps;

// 🔥 AUTOCOMPLETE
async function fetchSuggestions(query, dropdown, map, setLoc, setAddr, markerRef){
    if(query.length<3){
        dropdown.innerHTML="";
        return;
    }

    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
    const data=await res.json();

    dropdown.innerHTML="";

    data.forEach(place=>{
        const div=document.createElement("div");
        div.innerText=place.display_name;

        div.onclick=()=>{
            const lat=+place.lat;
            const lon=+place.lon;

            map.setView([lat,lon],12);

            if(markerRef.marker) map.removeLayer(markerRef.marker);
            markerRef.marker=L.marker([lat,lon]).addTo(map);

            setLoc({lat, lng:lon});
            setAddr(place.display_name);

            dropdown.innerHTML="";
        };

        dropdown.appendChild(div);
    });
}

// EVENTS
document.addEventListener("DOMContentLoaded",()=>{
    const sRef={marker:null};
    const eRef={marker:null};

    startSearch.addEventListener("input",e=>{
        fetchSuggestions(
            e.target.value,
            startDropdown,
            startMap,
            loc=>startLocation=loc,
            addr=>startAddress=addr,
            sRef
        );
    });

    endSearch.addEventListener("input",e=>{
        fetchSuggestions(
            e.target.value,
            endDropdown,
            endMap,
            loc=>endLocation=loc,
            addr=>endAddress=addr,
            eRef
        );
    });
});

// SUBMIT
async function submitRide(){
    try {
        if(!startLocation || !endLocation){
            return alert("Select locations");
        }

        const fd = new FormData();
        
        // Only append banner if file exists
        if (banner.files[0]) {
            fd.append("banner", banner.files[0]);
        }

        fd.append("title", title.value);
        fd.append("entryFee", entryFee.value);
        fd.append("startDate", startDate.value);
        fd.append("endDate", endDate.value);
        fd.append("time", time.value);
        fd.append("length", length.value);
        fd.append("difficulty", difficulty.value);
        fd.append("type", type.value);
        fd.append("maxSeats", maxSeats.value);
        fd.append("status", status.value);
        fd.append("communicationLink", communicationLink.value);
        fd.append("communicationType", communicationType.value);

        fd.append("startLocation", JSON.stringify(startLocation));
        fd.append("endLocation", JSON.stringify(endLocation));
        fd.append("startAddress", startAddress);
        fd.append("endAddress", endAddress);

        const res = await fetch("http://localhost:3000/rides/create", {
            method: "POST",
            credentials: "include",
            body: fd
        });

        if (!res.ok) {
            const error = await res.json();
            throw new Error(error.message || 'Failed to create ride');
        }

        const result = await res.json();
        
        if (result.success) {
            alert("Ride Created Successfully!");
            // Optional: redirect or clear form
            // window.location.href = 'dashboard.html';
        } else {
            alert("Error: " + (result.message || 'Unknown error'));
        }

    } catch (err) {
        console.error("Error:", err);
        alert("Error creating ride: " + err.message);
    }
}
</script>

</body>
</html>
