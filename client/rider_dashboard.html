<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideSync — Rider Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS — identical to signup/login
    ═══════════════════════════════════════════════ */
    :root {
      --black:      #000000;
      --white:      #ffffff;
      --orange:     #ff4d00;
      --orange-dim: rgba(255, 77, 0, 0.12);
      --orange-mid: rgba(255, 77, 0, 0.35);

      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-400: #999999;
      --gray-600: #555555;
      --gray-800: #1a1a1a;

      --font-head: 'Montserrat', sans-serif;
      --font-body: 'Roboto', sans-serif;

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;

      --shadow-sm:     0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:     0 6px 24px rgba(0,0,0,0.1);
      --shadow-lg:     0 16px 48px rgba(0,0,0,0.14);
      --shadow-orange: 0 4px 20px rgba(255,77,0,0.25);

      --transition:      0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s  cubic-bezier(0.4, 0, 0.2, 1);

      --nav-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* ═══════════════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 200;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .nav-brand-icon {
      font-size: 20px;
      filter: drop-shadow(0 0 6px var(--orange));
    }

    .nav-brand-name {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.02em;
    }

    .nav-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--orange-dim);
      border: 1px solid var(--orange-mid);
      border-radius: 100px;
      padding: 3px 10px;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-username {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
    }

    .nav-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color var(--transition), transform var(--transition);
      overflow: hidden;
    }

    .nav-avatar:hover {
      border-color: var(--orange);
      transform: scale(1.05);
    }

    .nav-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-logout {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-600);
      background: none;
      border: 1.5px solid var(--gray-200);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-logout:hover {
      color: #ef4444;
      border-color: #ef4444;
      background: #fef2f2;
    }

    /* ═══════════════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════════════ */
    .main {
      padding-top: calc(var(--nav-h) + 40px);
      padding-bottom: 80px;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 28px;
      padding-right: 28px;
    }

    /* ═══════════════════════════════════════════════
       HERO SECTION
    ═══════════════════════════════════════════════ */
    .hero {
      background: var(--black);
      border-radius: var(--radius-xl);
      padding: 48px 52px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,77,0,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: 40%;
      width: 400px; height: 200px;
      background: radial-gradient(ellipse, rgba(255,77,0,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-text { position: relative; z-index: 1; }

    .hero-greeting {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      color: var(--orange);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: 38px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero-subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      max-width: 400px;
    }

    .hero-icon {
      font-size: 96px;
      line-height: 1;
      opacity: 0.12;
      position: absolute;
      right: 52px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      user-select: none;
    }

    /* ═══════════════════════════════════════════════
       STATS ROW
    ═══════════════════════════════════════════════ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 18px;
      transition: box-shadow var(--transition), transform var(--transition);
    }

    .stat-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--orange-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      color: var(--black);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
      margin-top: 3px;
    }

    /* ═══════════════════════════════════════════════
       SECTION HEADER
    ═══════════════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.03em;
    }

    .section-count {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      letter-spacing: 0.04em;
    }

    /* ═══════════════════════════════════════════════
       FILTER BAR
    ═══════════════════════════════════════════════ */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .filter-btn.active {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    .filter-search {
      margin-left: auto;
      position: relative;
    }

    .filter-search input {
      height: 38px;
      padding: 0 14px 0 36px;
      border: 1.5px solid var(--gray-200);
      border-radius: 100px;
      background: var(--white);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--black);
      outline: none;
      width: 200px;
      transition: border-color var(--transition), width var(--transition), box-shadow var(--transition);
    }

    .filter-search input::placeholder { color: var(--gray-400); }

    .filter-search input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-dim);
      width: 240px;
    }

    .filter-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════
       RIDE CARDS GRID
    ═══════════════════════════════════════════════ */
    .rides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 22px;
    }

    .ride-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: box-shadow var(--transition-slow), transform var(--transition-slow), border-color var(--transition);
      display: flex;
      flex-direction: column;
    }

    .ride-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-6px);
      border-color: transparent;
    }

    /* Card image area */
    .ride-card-image {
      position: relative;
      height: 180px;
      background: var(--gray-800);
      overflow: hidden;
      flex-shrink: 0;
    }

    .ride-card-image-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #111 0%, #222 50%, #ff4d00 160%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ride-card:hover .ride-card-image-bg {
      transform: scale(1.07);
    }

    .ride-card-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 60%);
    }

    .ride-card-emoji {
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-size: 36px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      transition: transform var(--transition-slow);
    }

    .ride-card:hover .ride-card-emoji {
      transform: scale(1.15) rotate(-5deg);
    }

    .ride-card-type-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 4px 12px;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--white);
    }

    /* ── card spots badge ── */
    .ride-card-spots {
      position: absolute;
      top: 14px;
      left: 14px;
      background: var(--orange);
      border-radius: 100px;
      padding: 4px 10px;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
      transition: transform var(--transition);
    }

    .ride-card:hover .ride-card-spots {
      transform: scale(1.06);
    }

    /* Card body */
    .ride-card-body {
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .ride-card-title {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 10px;
      transition: color var(--transition);
    }

    .ride-card:hover .ride-card-title { color: var(--orange); }

    .ride-card-meta {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }

    .ride-card-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--gray-600);
    }

    .ride-card-meta-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .ride-card-desc {
      font-size: 13px;
      color: var(--gray-400);
      line-height: 1.6;
      margin-bottom: 18px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ride-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--gray-200);
    }

    .ride-card-organizer {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .org-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 800;
      color: var(--gray-600);
      flex-shrink: 0;
    }

    .org-name {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-600);
      letter-spacing: 0.02em;
    }

    .btn-join {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 100px;
      border: none;
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .btn-join:hover {
      background: var(--orange);
      box-shadow: var(--shadow-orange);
      transform: translateY(-1px);
    }

    /* ── Shimmer skeleton ── */
    .skeleton-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }

    .skeleton-image {
      height: 180px;
      background: var(--gray-200);
      position: relative;
      overflow: hidden;
    }

    .skeleton-body {
      padding: 20px 22px 22px;
    }

    .skeleton-line {
      background: var(--gray-200);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-line::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%);
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* ═══════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      opacity: 0.4;
    }

    .empty-title {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--gray-400);
    }

    /* ═══════════════════════════════════════════════
       RIDE DETAIL MODAL
    ═══════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-slow);
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 580px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      transform: scale(0.93) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.visible .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      position: relative;
      height: 220px;
      background: var(--black);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      overflow: hidden;
    }

    .modal-header-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #111 0%, #222 50%, #ff4d00 160%);
    }

    .modal-header-emoji {
      position: absolute;
      bottom: 24px;
      left: 28px;
      font-size: 56px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    .modal-close:hover { background: rgba(255,77,0,0.6); }

    .modal-body {
      padding: 28px 32px 36px;
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 900;
      color: var(--black);
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .modal-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .modal-meta-item {
      background: var(--gray-100);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .modal-meta-label {
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 5px;
    }

    .modal-meta-value {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
    }

    .modal-desc {
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--gray-200);
    }

    .modal-organizer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .modal-org-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 800;
    }

    .modal-org-info-label {
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    .modal-org-name {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 52px;
      width: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .btn-primary:hover {
      background: var(--orange);
      box-shadow: var(--shadow-orange);
      transform: translateY(-1px);
    }

    /* ═══════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--black);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 100px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .main { padding-left: 16px; padding-right: 16px; }
      .hero { padding: 32px 28px; }
      .hero-title { font-size: 28px; }
      .stats-row { grid-template-columns: 1fr; }
      .rides-grid { grid-template-columns: 1fr; }
      .modal-meta-grid { grid-template-columns: 1fr; }
      .filter-search { margin-left: 0; width: 100%; }
      .filter-search input { width: 100%; }
      .navbar { padding: 0 16px; }
      .nav-username { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════
       RIDE DETAIL MODAL
  ═══════════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay">

  </div>

  <div id="toast"></div>

  <script>
    (function () {
      'use strict';

      /* ══════════════════════════════════════════
         SCHEMA FIELD MAP  (matches Ride mongoose model)
         ride.title          — title
         ride.type           — 'Adventure'|'Highway'|'City'|'OffRoad'
         ride.difficulty     — 'Easy'|'Moderate'|'Hard'|'Extreme'
         ride.startLocation  — start point
         ride.endLocation    — end point
         ride.startDate      — Date
         ride.endDate        — Date
         ride.time           — String e.g. "07:30 AM"
         ride.length         — Number (km)
         ride.maxSeats       — total capacity
         ride.bookedSeats    — seats taken
         ride.entryFee       — Number (0 = free)
         ride.status         — 'Upcoming'|'Ongoing'|'Cancelled'|'Completed'
         ride.communicationLink / communicationType
         ride.userId         — populated organizer object (or ObjectId)
      ══════════════════════════════════════════ */

      /* ── Visual lookup maps ── */
      const TYPE_EMOJI = {
        adventure: '🏔️',
        highway:   '🛣️',
        city:      '🏙️',
        offroad:   '🌲',
        default:   '🏍️',
      };

      const TYPE_LABEL = {
        adventure: 'Adventure',
        highway:   'Highway',
        city:      'City',
        offroad:   'Off-Road',
      };

      const DIFF_COLOR = {
        easy:     '#22c55e',
        moderate: '#f59e0b',
        hard:     '#ef4444',
        extreme:  '#7c3aed',
      };

      const COMM_ICON = { telegram: '✈️', whatsapp: '💬', instagram: '📸' };

      const RIDE_COLORS = [
        '135deg,#111 0%,#1a1a1a 50%,#ff4d00 160%',
        '135deg,#0a0a1a 0%,#111 50%,#ff6b35 160%',
        '135deg,#0d1117 0%,#1a2332 50%,#ff4d00 160%',
        '135deg,#111 0%,#1c1c1c 40%,#e63900 160%',
        '135deg,#0f0c29 0%,#302b63 60%,#ff4d00 160%',
        '135deg,#1a0533 0%,#2d1b69 50%,#ff4500 160%',
      ];

      let currentUser  = { username: 'Rider', email: '', role: 'rider' };
      let allRides     = [];
      let activeFilter = 'all';   // matches ride.type lowercase or 'all'
      let activeModal  = null;

      /* ══════════════════════════════════════════
         INIT
      ══════════════════════════════════════════ */
      function init() {
        loadUserFromCookie();
        fetchRides();
        bindEvents();
      }

      /* ── JWT cookie → user ── */
      function loadUserFromCookie() {
        try {
          const match = document.cookie.match(/(?:^|;\s*)token=([^;]+)/);
          if (match) {
            const payload = JSON.parse(atob(match[1].split('.')[1]));
            currentUser = {
              username: payload.username || payload.userName || 'Rider',
              email:    payload.email    || '',
              role:     payload.role     || 'rider',
              _id:      payload._id      || payload.id || '',
            };
          }
        } catch (_) { /* absent or malformed — use defaults */ }
        renderUserInfo();
      }

      function renderUserInfo() {
        document.getElementById('navUsername').textContent = '@' + currentUser.username;
        document.getElementById('navAvatar').textContent   = (currentUser.username || 'R')[0].toUpperCase();
        document.getElementById('heroTitle').textContent   = 'Hey ' + currentUser.username + ', find your next ride';
      }

      /* ══════════════════════════════════════════
         FETCH
      ══════════════════════════════════════════ */
      async function fetchRides() {
        try {
          const res = await fetch('http://localhost:3000/rides/rider_rides', {
            method: 'GET',
            credentials: 'include',
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          console.log(data);
          // backend may return array directly, or { rides: [...] }
          allRides = Array.isArray(data) ? data : (data.data || []);
          renderRides(allRides);
          updateStats(allRides);
        } catch (err) {
          console.warn('Could not reach server — showing demo data.', err);
          allRides = getDemoRides();
          renderRides(allRides);
          updateStats(allRides);
        }
      }

      /* ══════════════════════════════════════════
         RENDER GRID
      ══════════════════════════════════════════ */
      function renderRides(rides) {
        const grid  = document.getElementById('ridesGrid');
        const count = document.getElementById('ridesCount');
        count.textContent = rides.length + ' ride' + (rides.length !== 1 ? 's' : '') + ' found';

        if (!rides.length) {
          grid.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">🏜️</span>
              <div class="empty-title">No rides found</div>
              <div class="empty-desc">Try a different filter or check back later.</div>
            </div>`;
          return;
        }

        grid.innerHTML = rides.map((ride, i) => buildCard(ride, i)).join('');
        grid.querySelectorAll('.ride-card').forEach((card, i) => {
          card.addEventListener('click', () => openModal(rides[i]));
        });
      }

      /* ── Build one card from real schema fields ── */
      function buildCard(ride, i) {
        const typeKey   = (ride.type || 'default').toLowerCase();
        const emoji     = TYPE_EMOJI[typeKey] || TYPE_EMOJI.default;
        const typeLabel = TYPE_LABEL[typeKey] || ride.type || 'General';
        const color     = RIDE_COLORS[i % RIDE_COLORS.length];

        const spotsLeft = ride.maxSeats - (ride.bookedSeats || 0);
        const spotsText = spotsLeft <= 0 ? 'Full' : spotsLeft + ' spots left';

        const dateRange = formatDateRange(ride.startDate, ride.endDate);
        const route     = escHtml(ride.startLocation) + ' → ' + escHtml(ride.endLocation);

        const diffKey   = (ride.difficulty || '').toLowerCase();
        const diffColor = DIFF_COLOR[diffKey] || 'var(--gray-400)';
        const feeText   = ride.entryFee > 0 ? '₹' + ride.entryFee : 'Free';

        // organizer — may be a populated object or just an ObjectId string
        const orgName = ride.userId?.username || ride.userId?.name || 'Organizer';
        const orgInit = orgName[0].toUpperCase();

        return `
          <div class="ride-card" data-idx="${i}">
            <div class="ride-card-image">
              <div class="ride-card-image-bg" style="background:linear-gradient(${color})"></div>
              <div class="ride-card-image-overlay"></div>
              <span class="ride-card-spots" style="${spotsLeft <= 0 ? 'background:#ef4444' : ''}">${spotsText}</span>
              <div class="ride-card-type-badge">${typeLabel}</div>
              <div class="ride-card-emoji">${emoji}</div>
            </div>
            <div class="ride-card-body">
              <div class="ride-card-title">${escHtml(ride.title)}</div>
              <div class="ride-card-meta">
                <div class="ride-card-meta-item">
                  <span class="ride-card-meta-icon">📍</span>
                  <span>${route}</span>
                </div>
                <div class="ride-card-meta-item">
                  <span class="ride-card-meta-icon">📅</span>
                  <span>${dateRange}</span>
                </div>
                <div class="ride-card-meta-item">
                  <span class="ride-card-meta-icon">⏰</span>
                  <span>${escHtml(ride.time || 'TBD')}</span>
                </div>
              </div>
              <div class="ride-card-footer">
                <div class="ride-card-organizer">
                  <div class="org-avatar">${orgInit}</div>
                  <div class="org-name">${escHtml(orgName)}</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  ${ride.difficulty ? `<span style="font-family:var(--font-head);font-size:10px;font-weight:700;color:${diffColor};letter-spacing:0.04em;">${ride.difficulty.toUpperCase()}</span>` : ''}
                  <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--orange);">${feeText}</span>
                </div>
              </div>
            </div>
          </div>`;
      }

      /* ── Stats from real schema fields ── */
      function updateStats(rides) {
        document.getElementById('statTotal').textContent = rides.length;

        const now     = new Date();
        const weekEnd = new Date(now);
        weekEnd.setDate(now.getDate() + 7);

        const thisWeek = rides.filter(r => {
          const d = new Date(r.startDate);
          return d >= now && d <= weekEnd;
        });
        document.getElementById('statThisWeek').textContent = thisWeek.length;

        const starts = new Set(rides.map(r => (r.startLocation || '').toLowerCase().trim()).filter(Boolean));
        document.getElementById('statLocations').textContent = starts.size || rides.length;
      }

      /* ══════════════════════════════════════════
         MODAL — all schema fields shown
      ══════════════════════════════════════════ */
      function openModal(ride) {
        activeModal = ride;
        const typeKey   = (ride.type || 'default').toLowerCase();
        const emoji     = TYPE_EMOJI[typeKey] || TYPE_EMOJI.default;
        const color     = RIDE_COLORS[Math.floor(Math.random() * RIDE_COLORS.length)];
        const spotsLeft = ride.maxSeats - (ride.bookedSeats || 0);
        const orgName   = ride.userId?.username || ride.userId?.name || 'Organizer';

        document.getElementById('modalHeaderBg').style.background = `linear-gradient(${color})`;
        document.getElementById('modalEmoji').textContent     = emoji;
        document.getElementById('modalTitle').textContent     = ride.title;
        document.getElementById('modalDate').textContent      = formatDateRange(ride.startDate, ride.endDate);
        document.getElementById('modalLocation').textContent  =
          (ride.startLocation || '?') + ' → ' + (ride.endLocation || '?');
        document.getElementById('modalSpots').textContent     =
          spotsLeft <= 0 ? 'Fully booked' : spotsLeft + ' / ' + ride.maxSeats + ' available';
        document.getElementById('modalType').textContent      =
          TYPE_LABEL[typeKey] || ride.type || 'General';
        document.getElementById('modalOrgAvatar').textContent = orgName[0].toUpperCase();
        document.getElementById('modalOrgName').textContent   = orgName;

        // Build the desc block from extra fields
        const parts = [];
        if (ride.time)       parts.push('⏰ Start time: ' + ride.time);
        if (ride.length)     parts.push('📏 Distance: ' + ride.length + ' km');
        if (ride.difficulty) parts.push('💪 Difficulty: ' + ride.difficulty);
        if (ride.entryFee > 0) parts.push('💰 Entry fee: ₹' + ride.entryFee);
        else                 parts.push('💰 Free to join');
        if (ride.communicationType && ride.communicationLink)
          parts.push((COMM_ICON[ride.communicationType] || '🔗') + ' ' +
            ride.communicationType.charAt(0).toUpperCase() + ride.communicationType.slice(1) +
            ': ' + ride.communicationLink);

        document.getElementById('modalDesc').textContent = parts.join('\n') || 'No additional details.';

        document.getElementById('modalOverlay').classList.add('visible');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        document.getElementById('modalOverlay').classList.remove('visible');
        document.body.style.overflow = '';
        activeModal = null;
      }

      /* ══════════════════════════════════════════
         FILTERS  (keyed on ride.type enum values)
      ══════════════════════════════════════════ */
      function applyFilters() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        let filtered = allRides;

        if (activeFilter !== 'all') {
          // filter buttons use data-filter matching ride.type lowercase
          filtered = filtered.filter(r =>
            (r.type || '').toLowerCase() === activeFilter
          );
        }

        if (q) {
          filtered = filtered.filter(r =>
            (r.title          || '').toLowerCase().includes(q) ||
            (r.startLocation  || '').toLowerCase().includes(q) ||
            (r.endLocation    || '').toLowerCase().includes(q) ||
            (r.difficulty     || '').toLowerCase().includes(q)
          );
        }

        renderRides(filtered);
      }

      /* ══════════════════════════════════════════
         EVENTS
      ══════════════════════════════════════════ */
      function bindEvents() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            applyFilters();
          });
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', e => {
          if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        document.getElementById('btnJoinModal').addEventListener('click', () => {
          if (activeModal?.communicationLink) {
            window.open(activeModal.communicationLink, '_blank', 'noopener');
          } else {
            showToast('🏍️ Join link not available yet.');
          }
          closeModal();
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
          try { await fetch('http://localhost:3000/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
          window.location.href = 'login.html';
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
      }

      /* ══════════════════════════════════════════
         UTILITIES
      ══════════════════════════════════════════ */
      function formatDateRange(start, end) {
        if (!start) return 'Date TBD';
        const s = new Date(start);
        const e = end ? new Date(end) : null;
        const opts = { day: 'numeric', month: 'short', year: 'numeric' };
        if (!e || isNaN(e) || s.toDateString() === e.toDateString()) {
          return isNaN(s) ? start : s.toLocaleDateString('en-IN', opts);
        }
        return s.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) +
               ' – ' + e.toLocaleDateString('en-IN', opts);
      }

      function escHtml(str) {
        return String(str || '')
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 3200);
      }

      /* ══════════════════════════════════════════
         DEMO DATA — uses exact schema field names
         Only shown when server is unreachable.
      ══════════════════════════════════════════ */
      function getDemoRides() {
        const now = new Date();
        const d = (offset) => new Date(now.getTime() + offset * 86400000).toISOString();
        return [
          {
            _id: '1', title: 'Himalayan Highway Run',
            type: 'Highway', difficulty: 'Hard',
            startLocation: 'Chandigarh', endLocation: 'Manali',
            startDate: d(5), endDate: d(9), time: '06:00 AM',
            length: 320, maxSeats: 30, bookedSeats: 18,
            entryFee: 500, status: 'Upcoming',
            communicationType: 'whatsapp', communicationLink: 'https://wa.me/group/example',
            userId: { username: 'MountainRidersCo' },
          },
          {
            _id: '2', title: 'BIC Track Experience',
            type: 'City', difficulty: 'Moderate',
            startLocation: 'Noida', endLocation: 'Buddh International Circuit',
            startDate: d(2), endDate: d(2), time: '08:00 AM',
            length: 40, maxSeats: 20, bookedSeats: 19,
            entryFee: 1200, status: 'Upcoming',
            communicationType: 'telegram', communicationLink: 'https://t.me/example',
            userId: { username: 'SpeedFreaks' },
          },
          {
            _id: '3', title: 'Thar Desert Rally',
            type: 'Adventure', difficulty: 'Extreme',
            startLocation: 'Jodhpur', endLocation: 'Jaisalmer',
            startDate: d(15), endDate: d(17), time: '05:30 AM',
            length: 560, maxSeats: 40, bookedSeats: 11,
            entryFee: 800, status: 'Upcoming',
            communicationType: 'instagram', communicationLink: 'https://instagram.com/example',
            userId: { username: 'DuneRiders' },
          },
          {
            _id: '4', title: 'Western Ghats Off-Road',
            type: 'OffRoad', difficulty: 'Hard',
            startLocation: 'Bangalore', endLocation: 'Coorg',
            startDate: d(8), endDate: d(10), time: '07:00 AM',
            length: 250, maxSeats: 25, bookedSeats: 8,
            entryFee: 0, status: 'Upcoming',
            communicationType: 'whatsapp', communicationLink: 'https://wa.me/group/offroad',
            userId: { username: 'GhatAdventures' },
          },
          {
